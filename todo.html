<!DOCTYPE html>
<html>
<head>
<title>To-Do App</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

.container{
width:350px;
margin:auto;
padding:20px;
border:1px solid #ccc;
border-radius:10px;
}

input{
padding:10px;
width:70%;
}

button{
padding:10px 15px;
cursor:pointer;
}

li{
list-style:none;
margin:10px 0;
padding:10px;
background:#f2f2f2;
display:flex;
justify-content:space-between;
}

.done{
text-decoration:line-through;
color:gray;
}
</style>
</head>
<body>

<div class="container">
<h2>To-Do List</h2>

<input type="text" id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>
</div>

<script>
function addTask(){
let taskInput=document.getElementById("task");
let task=taskInput.value.trim();

if(task===""){
alert("Enter a task");
return;
}

let li=document.createElement("li");

li.innerHTML=`
<span onclick="markDone(this)">${task}</span>
<button onclick="removeTask(this)">Delete</button>
`;

document.getElementById("taskList").appendChild(li);

taskInput.value="";
}

function removeTask(button){
button.parentElement.remove();
}

function markDone(item){
item.classList.toggle("done");
}
</script>

</body>
</html>
